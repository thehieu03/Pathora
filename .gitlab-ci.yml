stages:
  - build-and-deploy
deploy-app:
  stage: build-and-deploy
  tags:
    - do-an
  script:
    - echo "Bắt đầu quá trình build và deploy trực tiếp trên server..."
    # 1. Xóa container cũ nếu đang chạy để tránh trùng tên/port
    - docker stop panthora || true
    - docker rm panthora || true
    
    # 2. Build image mới từ Dockerfile trong source code
    - docker build -t panthora-be:latest .
    
    # 3. Chạy container mới
    - docker run -d --name panthora -p 8080:8080 panthora-be:latest
    
    # 4. Kiểm tra trạng thái container
    - docker ps | grep panthora