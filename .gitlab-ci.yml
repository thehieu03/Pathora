stages:
  - build-and-deploy

deploy-app:
  stage: build-and-deploy
  tags:
    - do-an-2
  only:
    - main
  script:
    - echo "Bắt đầu quá trình build Image cho Backend..."
    
    # 1. Build image mới (Đặt tên pathora-be cho khớp với compose của bạn)
    - docker build -t pathora-be:latest .
    # 3. Dùng Compose để cập nhật hệ thống
    - echo "Đang cập nhật các container qua Docker Compose..."
    
    - docker compose up -d