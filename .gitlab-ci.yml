stages:
  - build-and-deploy
deploy-app:
  stage: build-and-deploy
  tags:
    - do-an-fe
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - echo "Đang build Frontend..."
    - docker build --build-arg NEXT_PUBLIC_API_GATEWAY=https://pathora-api.duckdns.org -t pathora-fe:latest ./frontend
    - echo "Đang cập nhật các container qua Docker Compose..."
    - cd /home/huynqhe180309
    - touch .env
    - docker compose up -d
