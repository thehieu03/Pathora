services:
  api:
    container_name: api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - Redis__ConnectionString=redis:6379
      - MinIO__Endpoint=minio:9000
    restart: unless-stopped
    depends_on:
      - redis
      - minio
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    container_name: frontend
    build:
      context: ../pathora/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_GATEWAY: http://localhost:8080
        NEXT_PUBLIC_REMOTE_IMAGE_HOSTS: http://localhost:9000
        NEXT_PUBLIC_IMAGES_UNOPTIMIZED: "true"
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - api
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    container_name: redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    container_name: minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    volumes:
      - minio-data:/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    ports:
      - "9443:9443"
    environment:
      - PORTAINER_ADMIN_PASSWORD=thehieu12345
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis-data:
  portainer-data:
  minio-data:

networks:
  default:
    name: panthora-dev
