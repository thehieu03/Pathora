x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  api:
    build:
      context: ./backend
      dockerfile: src/Api/Dockerfile
    container_name: pathora-api
    ports:
      - "5182:8080"
    env_file:
      - ./backend/.env
    environment:
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      redis:
        condition: service_healthy
    init: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging: *default-logging
    networks:
      - pathora-network

  frontend:
    build:
      context: ./frontend/frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_GATEWAY=http://api:8080
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging: *default-logging
    networks:
      - pathora-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - pathora-network

  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "9002:9000"
    environment:
      - PORTAINER_ADMIN_PASSWORD=thehieu12345
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    restart: unless-stopped
    logging: *default-logging
    networks:
      - pathora-network

networks:
  pathora-network:
    driver: bridge

volumes:
  redis-data:
  portainer-data:
