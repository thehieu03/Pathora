services:
  # =========================================
  # Backend API - ASP.NET Core 10
  # =========================================
  api:
    build:
      context: ./backend
      dockerfile: src/Api/Dockerfile
    container_name: pathora-api
    restart: unless-stopped
    ports:
      - "5182:8080"
    env_file:
      - ./backend/.env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - CORS_ALLOWED_ORIGINS=${FRONTEND_URL:-http://localhost:3001}
      - FRONTEND_BASE_URL=${FRONTEND_URL:-http://localhost:3001}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # =========================================
  # Frontend - Next.js 16
  # =========================================
  frontend:
    build:
      context: ./frontend/frontend
      dockerfile: Dockerfile
    container_name: pathora-frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_GATEWAY=http://api:8080
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
