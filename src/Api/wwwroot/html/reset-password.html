<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - Pathora</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Segoe UI", sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .container { background: white; padding: 40px; border-radius: 16px; max-width: 400px; width: 100%; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2); text-align: center; }
        .icon { width: 80px; height: 80px; margin: 0 auto 20px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 40px; }
        h1 { color: #333; font-size: 24px; margin-bottom: 20px; }
        p { color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script>
        // Auto-redirect after 2 seconds
        setTimeout(function() {
            var token = new URLSearchParams(window.location.search).get('token');
            if (token) {
                window.location.href = '/reset-password?token=' + token;
            } else {
                document.getElementById('error').style.display = 'block';
                document.getElementById('spinner').style.display = 'none';
            }
        }, 2000);
    </script>
</head>
<body>
    <div class="container">
        <div class="icon">🔐</div>
        <h1>Đặt lại mật khẩu</h1>
        <p>Đang chuyển hướng đến trang đặt lại mật khẩu...</p>
        <div id="spinner" class="spinner"></div>
        <p id="error" style="display: none; color: red;">Token không hợp lệ</p>
    </div>
</body>
</html>
