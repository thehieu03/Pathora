services:
  redis:
    ports:
      - "6379:6379"
    volumes:
      - ./volume/redis:/data

  minio:
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console UI
    volumes:
      - ./volume/minio:/data

  portainer:
    # UI: https://localhost:9443 or http://localhost:9002
    command:
      - --admin-password=$$2y$$05$$WhRrYB./WG4XqeLi2CxdkOKwhd55Lio1QHSKsGkRjcxze7PEWHEoe
    ports:
      - "9443:9443"  # HTTPS UI
      - "9002:9000"  # HTTP UI
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./volume/portainer:/data
